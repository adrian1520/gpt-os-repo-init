name: GPT-OS Pipeline V2

on:
  repository_dispatch:
    types: [write_file, run_analysis]

permissions:
  contents: write

jobs:
  execute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bootstrap memory and set RUNNING state
        env:
          EVENT_TYPE: ${{ github.event.action }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          SESSION_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          CASE_ID: ${{ github.event.client_payload.case_id }}
          FILE_PATH: ${{ github.event.client_payload.path }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import os
          from datetime import datetime, timezone

          def now():
              return datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          def load_json(path, default):
              p = Path(path)
              if p.exists():
                  try:
                      return json.loads(p.read_text(encoding="utf-8"))
                  except Exception:
                      return default
              return default

          def write_json(path, data):
              p = Path(path)
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding="utf-8")

          # Required structure
          for d in [
              "memory",
              "contracts",
              "cases",
              "outputs",
              "docs",
              "core",
              "outputs/analysis",
              "outputs/logs",
              ".github/workflows",
          ]:
              Path(d).mkdir(parents=True, exist_ok=True)

          state = load_json(
              "memory/state.json",
              {
                  "system_state": "INIT",
                  "last_transition": None,
                  "active_mode": "init",
                  "last_run_id": None,
                  "last_update": None
              }
          )

          run_index = load_json("memory/run_index.json", {"runs": []})
          case_index = load_json("memory/case_index.json", {"cases": []})
          session_log = load_json("memory/session_log.json", {"sessions": []})
          repo_index = load_json("memory/repo_index.json", {"initialized": False, "structure_version": "2.0", "last_scan": None})

          event_type = os.environ["EVENT_TYPE"]
          run_id = int(os.environ["RUN_ID"])
          run_attempt = int(os.environ["RUN_ATTEMPT"])
          session_id = os.environ["SESSION_ID"]
          case_id = os.environ.get("CASE_ID") or None
          file_path = os.environ.get("FILE_PATH") or None

          prev_state = state.get("system_state") or "INIT"
          transition = f"{prev_state}→RUNNING" if prev_state != "RUNNING" else "RUNNING→RUNNING"

          outputs_expected = []
          if event_type == "write_file" and file_path:
              outputs_expected = [file_path]
          elif event_type == "run_analysis":
              outputs_expected = ["outputs/analysis/result.txt"]

          state.update({
              "system_state": "RUNNING",
              "last_transition": transition,
              "active_mode": "execution" if event_type in ("write_file", "run_analysis") else event_type,
              "last_run_id": run_id,
              "last_update": now()
          })

          runs = [r for r in run_index.get("runs", []) if r.get("run_id") != run_id]
          runs.append({
              "run_id": run_id,
              "run_attempt": run_attempt,
              "dispatch_id": f"{event_type}:{run_id}:{run_attempt}",
              "event_type": event_type,
              "status": "running",
              "conclusion": None,
              "session_id": session_id,
              "case_id": case_id,
              "started_at": now(),
              "finished_at": None,
              "outputs_expected": outputs_expected,
              "outputs_found": False,
              "notes": "bootstrap" if prev_state == "INIT" else ""
          })
          run_index["runs"] = runs

          session_log.setdefault("sessions", []).append({
              "session_id": session_id,
              "started_at": now(),
              "last_event": "started",
              "mode": "init" if prev_state == "INIT" else "execution",
              "case_id": case_id,
              "run_id": run_id,
              "event_type": event_type,
              "summary": f"Started {event_type} run"
          })

          repo_index["initialized"] = True
          repo_index["last_scan"] = now()

          if case_id:
              cases = case_index.get("cases", [])
              if not isinstance(cases, list):
                  cases = []

              found = False
              for c in cases:
                  if isinstance(c, dict) and c.get("case_id") == case_id:
                      c["last_run_id"] = run_id
                      c["last_update"] = now()
                      c["status"] = c.get("status") or "active"
                      found = True
                      break

              if not found:
                  cases.append({
                      "case_id": case_id,
                      "status": "active",
                      "documents_count": 0,
                      "events_count": 0,
                      "outputs_ready": False,
                      "last_update": now(),
                      "active_branch": None,
                      "last_run_id": run_id
                  })

              case_index["cases"] = cases

          write_json("memory/state.json", state)
          write_json("memory/run_index.json", run_index)
          write_json("memory/session_log.json", session_log)
          write_json("memory/repo_index.json", repo_index)
          write_json("memory/case_index.json", case_index)
          PY

      - name: Commit bootstrap tracking
        run: |
          git add .
          git commit -m "GPT-OS bootstrap tracking" || true
          git push

      - name: Write file
        if: github.event.action == 'write_file'
        env:
          FILE_PATH: ${{ github.event.client_payload.path }}
          FILE_CONTENT: ${{ github.event.client_payload.content }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os

          file_path = Path(os.environ["FILE_PATH"])
          file_content = os.environ.get("FILE_CONTENT", "")

          file_path.parent.mkdir(parents=True, exist_ok=True)
          file_path.write_text(file_content, encoding="utf-8")
          PY

      - name: Commit write
        if: github.event.action == 'write_file'
        run: |
          git add .
          git commit -m "GPT-OS write: ${{ github.event.client_payload.path }}" || true
          git push

      - name: Run analysis
        if: github.event.action == 'run_analysis'
        run: |
          mkdir -p outputs/analysis outputs/logs
          printf '%s\n' "analysis completed" > outputs/analysis/result.txt
          printf '%s\n' "run_id=${{ github.run_id }}" > outputs/logs/latest.log

      - name: Validate outputs
        if: github.event.action == 'run_analysis'
        run: |
          test -s outputs/analysis/result.txt

      - name: Finalize success
        if: success()
        env:
          EVENT_TYPE: ${{ github.event.action }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          SESSION_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          CASE_ID: ${{ github.event.client_payload.case_id }}
          FILE_PATH: ${{ github.event.client_payload.path }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import os
          from datetime import datetime, timezone

          def now():
              return datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          def load_json(path, default):
              p = Path(path)
              if p.exists():
                  try:
                      return json.loads(p.read_text(encoding="utf-8"))
                  except Exception:
                      return default
              return default

          def write_json(path, data):
              p = Path(path)
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding="utf-8")

          event_type = os.environ["EVENT_TYPE"]
          run_id = int(os.environ["RUN_ID"])
          run_attempt = int(os.environ["RUN_ATTEMPT"])
          session_id = os.environ["SESSION_ID"]
          case_id = os.environ.get("CASE_ID") or None
          file_path = os.environ.get("FILE_PATH") or None

          state = load_json("memory/state.json", {})
          run_index = load_json("memory/run_index.json", {"runs": []})
          session_log = load_json("memory/session_log.json", {"sessions": []})
          repo_index = load_json("memory/repo_index.json", {"initialized": False, "structure_version": "2.0", "last_scan": None})
          case_index = load_json("memory/case_index.json", {"cases": []})

          if event_type == "write_file" and file_path:
              outputs_found = Path(file_path).exists()
              outputs_expected = [file_path]
          elif event_type == "run_analysis":
              out = Path("outputs/analysis/result.txt")
              outputs_found = out.exists() and out.stat().st_size > 0
              outputs_expected = ["outputs/analysis/result.txt"]
          else:
              outputs_found = False
              outputs_expected = []

          current_state = state.get("system_state") or "RUNNING"
          state.update({
              "system_state": "VERIFIED",
              "last_transition": f"{current_state}→VERIFIED",
              "active_mode": "execution",
              "last_run_id": run_id,
              "last_update": now()
          })

          updated = []
          for r in run_index.get("runs", []):
              if r.get("run_id") == run_id:
                  r["status"] = "completed"
                  r["conclusion"] = "success"
                  r["finished_at"] = now()
                  r["outputs_found"] = outputs_found
                  r["outputs_expected"] = outputs_expected
              updated.append(r)
          run_index["runs"] = updated

          session_log.setdefault("sessions", []).append({
              "session_id": session_id,
              "started_at": now(),
              "last_event": "completed",
              "mode": "execution",
              "case_id": case_id,
              "run_id": run_id,
              "event_type": event_type,
              "summary": f"{event_type} completed successfully"
          })

          if case_id:
              cases = case_index.get("cases", [])
              if not isinstance(cases, list):
                  cases = []
              for c in cases:
                  if isinstance(c, dict) and c.get("case_id") == case_id:
                      c["last_run_id"] = run_id
                      c["last_update"] = now()
                      c["status"] = "verified"
                      c["outputs_ready"] = outputs_found
                      c["events_count"] = int(c.get("events_count") or 0) + 1
                      if event_type == "write_file":
                          c["documents_count"] = int(c.get("documents_count") or 0) + 1
                      break
              case_index["cases"] = cases

          repo_index["last_scan"] = now()

          write_json("memory/state.json", state)
          write_json("memory/run_index.json", run_index)
          write_json("memory/session_log.json", session_log)
          write_json("memory/repo_index.json", repo_index)
          write_json("memory/case_index.json", case_index)
          PY

          git add .
          git commit -m "GPT-OS finalize success" || true
          git push

      - name: Finalize failure
        if: failure()
        env:
          EVENT_TYPE: ${{ github.event.action }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          SESSION_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          CASE_ID: ${{ github.event.client_payload.case_id }}
          FILE_PATH: ${{ github.event.client_payload.path }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import os
          from datetime import datetime, timezone

          def now():
              return datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          def load_json(path, default):
              p = Path(path)
              if p.exists():
                  try:
                      return json.loads(p.read_text(encoding="utf-8"))
                  except Exception:
                      return default
              return default

          def write_json(path, data):
              p = Path(path)
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding="utf-8")

          event_type = os.environ["EVENT_TYPE"]
          run_id = int(os.environ["RUN_ID"])
          run_attempt = int(os.environ["RUN_ATTEMPT"])
          session_id = os.environ["SESSION_ID"]
          case_id = os.environ.get("CASE_ID") or None
          file_path = os.environ.get("FILE_PATH") or None

          state = load_json("memory/state.json", {})
          run_index = load_json("memory/run_index.json", {"runs": []})
          session_log = load_json("memory/session_log.json", {"sessions": []})
          repo_index = load_json("memory/repo_index.json", {"initialized": False, "structure_version": "2.0", "last_scan": None})
          case_index = load_json("memory/case_index.json", {"cases": []})

          if event_type == "write_file" and file_path:
              outputs_found = Path(file_path).exists()
              outputs_expected = [file_path]
          elif event_type == "run_analysis":
              out = Path("outputs/analysis/result.txt")
              outputs_found = out.exists() and out.stat().st_size > 0
              outputs_expected = ["outputs/analysis/result.txt"]
          else:
              outputs_found = False
              outputs_expected = []

          current_state = state.get("system_state") or "RUNNING"
          state.update({
              "system_state": "FAILED",
              "last_transition": f"{current_state}→FAILED",
              "active_mode": "debug",
              "last_run_id": run_id,
              "last_update": now()
          })

          updated = []
          for r in run_index.get("runs", []):
              if r.get("run_id") == run_id:
                  r["status"] = "completed"
                  r["conclusion"] = "failure"
                  r["finished_at"] = now()
                  r["outputs_found"] = outputs_found
                  r["outputs_expected"] = outputs_expected
              updated.append(r)
          run_index["runs"] = updated

          session_log.setdefault("sessions", []).append({
              "session_id": session_id,
              "started_at": now(),
              "last_event": "failed",
              "mode": "debug",
              "case_id": case_id,
              "run_id": run_id,
              "event_type": event_type,
              "summary": f"{event_type} failed"
          })

          if case_id:
              cases = case_index.get("cases", [])
              if not isinstance(cases, list):
                  cases = []
              for c in cases:
                  if isinstance(c, dict) and c.get("case_id") == case_id:
                      c["last_run_id"] = run_id
                      c["last_update"] = now()
                      c["status"] = "active"
                      c["outputs_ready"] = False
                      c["events_count"] = int(c.get("events_count") or 0) + 1
                      break
              case_index["cases"] = cases

          repo_index["last_scan"] = now()

          write_json("memory/state.json", state)
          write_json("memory/run_index.json", run_index)
          write_json("memory/session_log.json", session_log)
          write_json("memory/repo_index.json", repo_index)
          write_json("memory/case_index.json", case_index)
          PY

          git add .
          git commit -m "GPT-OS finalize failure" || true
          git push