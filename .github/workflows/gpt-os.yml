name: GPT-OS Pipeline V2

on:
  repository_dispatch:

permissions:
  contents: write

jobs:
  execute:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------
      # PYTHON
      # -------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # -------------------------
      # QUEUE MODE (BOOTSTRAP)
      # -------------------------
      - name: Process bootstrap queue
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          queue = Path("core/bootstrap.json")

          if queue.exists():
              data = json.loads(queue.read_text())

              for f in data.get("files", []):
                  path = Path(f["path"])
                  path.parent.mkdir(parents=True, exist_ok=True)
                  path.write_text(f.get("content", ""), encoding="utf-8")
          PY

      # -------------------------
      # BOOTSTRAP MEMORY + RUN TRACKING
      # -------------------------
      - name: Bootstrap memory and set RUNNING state
        env:
          EVENT_TYPE: ${{ github.event.action }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import os
          from datetime import datetime, timezone

          def now():
              return datetime.now(timezone.utc).isoformat()

          def load(path, default):
              p = Path(path)
              if p.exists():
                  try:
                      return json.loads(p.read_text())
                  except:
                      return default
              return default

          def write(path, data):
              p = Path(path)
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(json.dumps(data, indent=2))

          state = load("memory/state.json", {})
          run_index = load("memory/run_index.json", {"runs": []})

          run_id = int(os.environ["RUN_ID"])
          run_attempt = int(os.environ["RUN_ATTEMPT"])

          state.update({
              "system_state": "RUNNING",
              "last_run_id": run_id,
              "last_update": now()
          })

          run_index["runs"].append({
              "run_id": run_id,
              "run_attempt": run_attempt,
              "status": "running",
              "started_at": now()
          })

          write("memory/state.json", state)
          write("memory/run_index.json", run_index)
          PY

      - name: Commit bootstrap tracking
        run: |
          git add .
          git commit -m "GPT-OS bootstrap tracking" || true
          git push

      # -------------------------
      # WRITE FILE (OPTIONAL)
      # -------------------------
      - name: Write file (fallback)
        if: github.event.action == 'write_file'
        run: |
          echo "No payload mode active - skipped direct write"

      # -------------------------
      # RUN ANALYSIS
      # -------------------------
      - name: Run analysis
        if: github.event.action == 'run_analysis'
        run: |
          mkdir -p outputs/analysis outputs/logs
          echo "analysis completed" > outputs/analysis/result.txt

      # -------------------------
      # FINALIZE SUCCESS
      # -------------------------
      - name: Finalize success
        if: success()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from datetime import datetime

          def now():
              return datetime.utcnow().isoformat()

          def load(p, d):
              p = Path(p)
              if p.exists():
                  return json.loads(p.read_text())
              return d

          def write(p, d):
              Path(p).write_text(json.dumps(d, indent=2))

          state = load("memory/state.json", {})
          run_index = load("memory/run_index.json", {"runs": []})

          if run_index["runs"]:
              run_index["runs"][-1]["status"] = "completed"
              run_index["runs"][-1]["finished_at"] = now()

          state["system_state"] = "VERIFIED"
          state["last_update"] = now()

          write("memory/state.json", state)
          write("memory/run_index.json", run_index)
          PY

          git add .
          git commit -m "GPT-OS finalize success" || true
          git push

      # -------------------------
      # FINALIZE FAILURE
      # -------------------------
      - name: Finalize failure
        if: failure()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from datetime import datetime

          def now():
              return datetime.utcnow().isoformat()

          def load(p, d):
              p = Path(p)
              if p.exists():
                  return json.loads(p.read_text())
              return d

          def write(p, d):
              Path(p).write_text(json.dumps(d, indent=2))

          state = load("memory/state.json", {})
          run_index = load("memory/run_index.json", {"runs": []})

          if run_index["runs"]:
              run_index["runs"][-1]["status"] = "failed"
              run_index["runs"][-1]["finished_at"] = now()

          state["system_state"] = "FAILED"
          state["last_update"] = now()

          write("memory/state.json", state)
          write("memory/run_index.json", run_index)
          PY

          git add .
          git commit -m "GPT-OS finalize failure" || true
          git push